name: CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    name: Test Library
    runs-on: ubuntu-latest
    timeout-minutes: 10
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '25.x'
        cache: 'npm'
        
    - name: Install dependencies
      run: npm ci --prefer-offline --no-audit
        
    - name: Run tests
      run: npm test
      
    - name: Test CLI
      run: node index.js --help
        
    - name: Test library loading
      run: |
        node -e "
        const { CodeQualityChecker } = require('./index.js');
        console.log('✅ Library loads successfully');
        console.log('✅ Export:', typeof CodeQualityChecker);
        "

  test-bun:
    name: Test Library (Bun)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Setup Bun
      uses: oven-sh/setup-bun@v2
      with:
        bun-version: '1.3.x'
        
    - name: Install dependencies
      run: bun install
        
    - name: Run tests
      run: bun test/basic.test.js
      
    - name: Test CLI
      run: bun index.js --help
        
    - name: Test library loading
      run: |
        bun -e "
        const { CodeQualityChecker } = require('./index.js');
        console.log('✅ Library loads successfully with Bun');
        console.log('✅ Export:', typeof CodeQualityChecker);
        "

  publish:
    name: Publish to NPM
    runs-on: ubuntu-latest
    needs: [test, test-bun]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment: production
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '25.x'
        registry-url: 'https://registry.npmjs.org'
        cache: 'npm'
        
    - name: Install dependencies
      run: npm ci --prefer-offline --no-audit

    - name: Check if version already published
      id: version_check
      run: |
        LOCAL_VERSION=$(node -p "require('./package.json').version")
        PUBLISHED=$(npm view code-quality-lib versions --json 2>/dev/null || echo "[]")
        if echo "$PUBLISHED" | grep -q "\"$LOCAL_VERSION\""; then
          echo "skip=true" >> "$GITHUB_OUTPUT"
          echo "⏭️ Version $LOCAL_VERSION already published, skipping"
        else
          echo "skip=false" >> "$GITHUB_OUTPUT"
          echo "📦 Version $LOCAL_VERSION not yet published, proceeding"
        fi
      env:
        NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

    - name: Build package
      if: steps.version_check.outputs.skip == 'false'
      run: npm pack
      
    - name: Publish to NPM
      if: steps.version_check.outputs.skip == 'false'
      run: npm publish --access public
      env:
        NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
