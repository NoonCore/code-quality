name: CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  test:
    name: Test Library
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '22.x'
          cache: 'npm'

      - name: Install dependencies
        run: npm_config_loglevel=error npm ci --prefer-offline --no-audit

      - name: Run tests
        run: npm test

      - name: Test CLI
        run: node index.js --help

  test-bun:
    name: Test Library (Bun)
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Setup Bun
        run: |
          curl -fsSL https://bun.sh/install | bash
          echo "$HOME/.bun/bin" >> $GITHUB_PATH

      - name: Install dependencies
        run: bun install

      - name: Run tests
        run: bun test/basic.test.js

      - name: Test CLI
        run: bun index.js --help

  test-pnpm:
    name: Test Library (pnpm)
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '22.x'

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: '10.x'

      - name: Install dependencies
        run: pnpm install

      - name: Run tests
        run: pnpm test

      - name: Test CLI
        run: node index.js --help

  test-yarn:
    name: Test Library (Yarn)
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '22.x'

      - name: Enable Corepack
        run: corepack enable

      - name: Setup Yarn
        run: corepack prepare yarn@4.13.0 --activate

      - name: Install dependencies
        run: yarn install --no-immutable

      - name: Run tests
        run: yarn test

      - name: Test CLI
        run: node index.js --help

  publish:
    name: Publish to NPM
    runs-on: ubuntu-latest
    needs: [test, test-bun, test-pnpm, test-yarn]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment: production

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '22.x'
          registry-url: 'https://registry.npmjs.org'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --prefer-offline --no-audit

      - name: Check if version already published
        id: version_check
        run: |
          LOCAL_VERSION=$(node -p "require('./package.json').version")
          PUBLISHED=$(npm view code-quality-lib versions --json 2>/dev/null || echo "[]")
          if echo "$PUBLISHED" | grep -q "\"$LOCAL_VERSION\""; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "⏭️ Version $LOCAL_VERSION already published, skipping"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
            echo "📦 Version $LOCAL_VERSION not yet published, proceeding"
          fi
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Build package
        if: steps.version_check.outputs.skip == 'false'
        run: npm pack

      - name: Publish to NPM
        if: steps.version_check.outputs.skip == 'false'
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
